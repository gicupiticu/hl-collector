name: Hyperliquid daily snapshot

on:
  schedule:
    # Target: snapshot 5:50pm NY (entry design: short at 6:00pm NY).
    # HOURLY attempts: GitHub defers cron on new/low-activity repos by many
    # hours (observed: 12h+, batched). Hourly firing means some attempts land
    # inside the ~17:05-19:25 NY window; all others exit in seconds.
    # Backfill of outcome columns happens on every attempt.
    - cron: '15 * * * *'
  workflow_dispatch: {}      # manual run button for testing

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run collector
        run: python hl_collector.py
      - name: Commit data
        run: |
          if [ -f data/snapshot.csv ]; then
            git config user.name "collector-bot"
            git config user.email "bot@users.noreply.github.com"
            git add data/snapshot.csv
            git diff --cached --quiet || git commit -m "snapshot $(date -u +%F)"
            git push
          else
            echo "no data file - nothing to commit"
          fi
