name: Hyperliquid daily snapshot

on:
  schedule:
    # Target: snapshot 5:50pm NY (entry design: short at 6:00pm NY).
    # Multiple attempts because GitHub cron is unreliable; the script exits
    # fast if it already collected today or is outside ~17:05-19:25 New York.
    - cron: '20 21 * * *'   # 5:20pm EDT / 4:20pm EST
    - cron: '50 21 * * *'   # 5:50pm EDT / 4:50pm EST
    - cron: '20 22 * * *'   # 6:20pm EDT / 5:20pm EST
    - cron: '50 22 * * *'   # 6:50pm EDT / 5:50pm EST
    - cron: '10 23 * * *'   # 7:10pm EDT / 6:10pm EST
  workflow_dispatch: {}      # manual run button for testing

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run collector
        run: python hl_collector.py
      - name: Commit data
        run: |
          if [ -f data/snapshot.csv ]; then
            git config user.name "collector-bot"
            git config user.email "bot@users.noreply.github.com"
            git add data/snapshot.csv
            git diff --cached --quiet || git commit -m "snapshot $(date -u +%F)"
            git push
          else
            echo "no data file - nothing to commit"
          fi
