name: Hyperliquid daily snapshot

on:
  schedule:
    # Multiple attempts because GitHub cron is unreliable; the script exits
    # fast if it already collected today or is outside ~16:40-19:00 New York.
    - cron: '55 20 * * *'   # 4:55pm EDT / 3:55pm EST
    - cron: '25 21 * * *'   # 5:25pm EDT / 4:25pm EST
    - cron: '55 21 * * *'   # 5:55pm EDT / 4:55pm EST
    - cron: '25 22 * * *'   # 6:25pm EDT / 5:25pm EST
    - cron: '55 22 * * *'   # 6:55pm EDT / 5:55pm EST
  workflow_dispatch: {}      # manual run button for testing

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run collector
        run: python hl_collector.py
      - name: Commit data
        run: |
          if [ -f data/snapshot.csv ]; then
            git config user.name "collector-bot"
            git config user.email "bot@users.noreply.github.com"
            git add data/snapshot.csv
            git diff --cached --quiet || git commit -m "snapshot $(date -u +%F)"
            git push
          else
            echo "no data file - nothing to commit"
          fi
